# Intranet content for MCP tools (read-only). Scope is limited to configured backends
# and host allow rules — not the public internet.
#
# provider:
#   - sharepoint_pages: Microsoft Graph site pages (delegated; same MS env as SharePoint MCP)
#   - wiki: reserved for future wiki adapters (currently not implemented)
#
# SharePoint permissions: Sites.Read.All (delegated), same as existing SharePoint tools.
#
version: 1

intranet:
  provider: sharepoint_pages
  # Exact hostnames for page webUrl checks (recommended). If empty, derived from site webUrl.
  allow_hosts:
    - liveuclac.sharepoint.com
  limits:
    max_fetch_chars: 120000
    graph_timeout_seconds: 90
  sharepoint_pages:
    sites:
      # Graph site path: {hostname}:/{server-relative-site-url}
      # Use the site path from the address bar on the site home (not /_layouts/... pages).
      # Example: https://liveuclac.sharepoint.com/sites/YourSite -> path below.
      - label: "UCL Sharepoint"
        site_path: "liveuclac.sharepoint.com:/sites/YourSite"
    # Examples:
    # - label: main-intranet
    #   site_path: "contoso.sharepoint.com:/sites/Intranet"
    # - label: hr-root
    #   graph_site_id: "contoso.sharepoint.com,abc...,def..."
